<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" role="img" aria-label="1968 創設 Founding Member 2026 badge">
  <defs>
    <radialGradient id="baseGold" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#E3C987"/>
      <stop offset="58%" stop-color="#C8A25E"/>
      <stop offset="100%" stop-color="#A9823D"/>
    </radialGradient>
    <filter id="letterpress" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="1968" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1F1F1F" flood-opacity="0.16"/>
    </filter>
    <style>
      .jp { font-family: 'Noto Serif CJK JP', 'Noto Sans CJK JP', serif; font-weight: 700; }
      .en { font-family: 'Noto Sans CJK JP', Arial, sans-serif; font-weight: 500; letter-spacing: 1.4px; }
      .num { font-family: 'Noto Sans CJK JP', Arial, sans-serif; font-weight: 700; letter-spacing: 1.6px; }
    </style>
  </defs>

  <!-- transparent outer canvas -->
  <circle cx="120" cy="120" r="110" fill="#F8F4EC" filter="url(#softShadow)"/>
  <circle cx="120" cy="120" r="102" fill="url(#baseGold)" filter="url(#letterpress)"/>
  <circle cx="120" cy="120" r="96" fill="none" stroke="#1F1F1F" stroke-width="1.4" opacity="0.78"/>
  <circle cx="120" cy="120" r="88" fill="none" stroke="#F8F4EC" stroke-width="1.1" opacity="0.62"/>
  <circle cx="120" cy="120" r="77" fill="#F8F4EC" opacity="0.93"/>
  <circle cx="120" cy="120" r="72" fill="none" stroke="#1F1F1F" stroke-width="1" opacity="0.34"/>

  <text x="120" y="106" class="jp" font-size="49" fill="#1F1F1F" text-anchor="middle">創設</text>
  <line x1="74" y1="125" x2="166" y2="125" stroke="#1F1F1F" stroke-width="0.8" opacity="0.45"/>
  <text x="120" y="146" class="en" font-size="10.2" fill="#1F1F1F" text-anchor="middle">Founding Member</text>
  <text x="120" y="162" class="num" font-size="14" fill="#1F1F1F" text-anchor="middle">2026</text>

  <path id="topArc" d="M 56 121 A 64 64 0 0 1 184 121" fill="none"/>
  <text class="en" font-size="7.5" fill="#1F1F1F" opacity="0.72" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">1968 COMMUNITY</textPath>
  </text>
</svg>
